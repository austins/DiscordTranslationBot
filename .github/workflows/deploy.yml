name: Deploy

on:
    push:
        branches: [ main ]
        paths:
            - '.dockerignore'
            - '.editorconfig'
            - '*.slnx'
            - 'Directory.Build.props'
            - 'global.json'
            - 'src/**'
            - 'tests/**'

concurrency:
    group: deploy
    cancel-in-progress: true

env:
    REGISTRY: ghcr.io

jobs:
    test:
        uses: ./.github/workflows/test.yml
    docker:
        needs: test
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
            -   name: Login to Docker registry
                uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
                with:
                    registry: ${{ env.REGISTRY }}
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}
            -   name: Set image name
                # Periods are not allowed in the Docker image name; replace any with a hyphen.
                run: echo "IMAGE_NAME=${GITHUB_REPOSITORY//./-}" >> $GITHUB_ENV
            -   name: Extract Docker metadata
                id: meta
                uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
                with:
                    images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                    tags: type=raw,value=latest,enable={{is_default_branch}}
            -   name: Build and push
                uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
                with:
                    context: .
                    file: ./src/DiscordTranslationBot/Dockerfile
                    push: true
                    tags: ${{ steps.meta.outputs.tags }}
                    labels: ${{ steps.meta.outputs.labels }}
                    cache-from: type=gha,scope=deploy
                    cache-to: type=gha,mode=max,scope=deploy
                    github-token: ${{ secrets.GITHUB_TOKEN }}
    deploy:
        needs: docker
        environment:
            name: production
        runs-on: ubuntu-latest
        steps:
            -   name: Trigger deployment webhook
                uses: distributhor/workflow-webhook@2381f0e9c7b6bf061fb1405bd0804b8706116369 # v3.0.8
                with:
                    webhook_url: ${{ secrets.WEBHOOK_URL }}
                    webhook_secret: ${{ secrets.WEBHOOK_SECRET }}
