name: Deploy

on:
    push:
        branches: [ main ]
        paths:
            - '.dockerignore'
            - '.editorconfig'
            - '*.slnx'
            - 'Directory.Build.props'
            - 'global.json'
            - 'src/**'
            - 'tests/**'
    workflow_dispatch:

concurrency:
    group: deploy
    cancel-in-progress: true

env:
    REGISTRY: ghcr.io

jobs:
    test:
        uses: ./.github/workflows/test.yml
    docker:
        needs: test
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
            -   name: Login to Docker registry
                uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
                with:
                    registry: ${{ env.REGISTRY }}
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}
            -   name: Set image name
                # Periods are not allowed in the Docker image name; replace any with a hyphen.
                run: echo "IMAGE_NAME=${GITHUB_REPOSITORY//./-}" >> $GITHUB_ENV
            -   name: Extract Docker metadata
                id: meta
                uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
                with:
                    images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                    tags: type=raw,value=latest,enable={{is_default_branch}}
            -   name: Build and push
                uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
                with:
                    context: .
                    file: ./src/DiscordTranslationBot/Dockerfile
                    push: true
                    tags: ${{ steps.meta.outputs.tags }}
                    labels: ${{ steps.meta.outputs.labels }}
                    cache-from: type=gha,scope=deploy
                    cache-to: type=gha,mode=max,scope=deploy
                    github-token: ${{ secrets.GITHUB_TOKEN }}
    deploy:
        needs: docker
        environment:
            name: production
        runs-on: ubuntu-latest
        steps:
            -   name: Trigger deployment webhook
                uses: distributhor/workflow-webhook@2381f0e9c7b6bf061fb1405bd0804b8706116369 # v3.0.8
                with:
                    webhook_url: ${{ secrets.WEBHOOK_URL }}
                    webhook_secret: ${{ secrets.WEBHOOK_SECRET }}
